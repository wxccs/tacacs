# Example: TACACS+ shared-secret authentication (RFC 9950 Appendix A).
server:
  - name: tac_plus1
    server-type: authentication
    address: 192.0.2.2
    port: 49
    security:
      shared-secret: "REPLACE_WITH_SHARED_SECRET"
    source:
      source-ip: 192.0.2.12
    timeout: 10
