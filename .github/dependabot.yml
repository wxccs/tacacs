#
# Dependabot config: weekly checks for Go module updates (main + interop)
# and GitHub Actions version bumps. PR limit is conservative to keep the
# review queue manageable.

version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go

  - package-ecosystem: gomod
    directory: /interop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - go
      - interop

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
