# CI workflow: format check, vet, lint and test the tacacs library.

name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_interop:
        description: "Run the tacquito interop job"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build, vet and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install PAM development headers
        # cmd/tacacs-cli/aaa/pam_authenticator_linux.go (build tag: linux && cgo)
        # imports github.com/msteinert/pam/v2, a cgo package that requires
        # security/pam_appl.h provided by libpam0g-dev on Debian/Ubuntu.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpam0g-dev

      - name: Download dependencies
        run: go mod download

      - name: Verify gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Print coverage
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      - name: Upload coverage to Codecov
        # Public repos can use Codecov without a token. The action auto-detects
        # the token from the CODECOV_TOKEN secret when one is configured.
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          verbose: true

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install PAM development headers
        # golangci-lint typechecks cmd/tacacs-cli/aaa, which on linux pulls in
        # the cgo pam_authenticator_linux.go and needs security/pam_appl.h.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpam0g-dev

      - name: golangci-lint
        # golangci-lint-action v9 supports golangci-lint v2 (v7+); v6 supports
        # v1 only. The v1 binary (built with Go 1.24) cannot analyze code
        # targeting Go 1.26, so v2 is required.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install PAM development headers
        # Fuzz currently targets crypto/legacy/packet/transport/types, but
        # keep PAM headers installed so future fuzz additions in cmd/tacacs-cli
        # don't silently break on the linux+cgo build tag.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpam0g-dev

      - name: Fuzz parsers briefly
        # A short run of every Fuzz* target catches crashes/panics in the code
        # paths that parse untrusted network input, without lengthening CI.
        run: make fuzz FUZZTIME=15s

  interop:
    name: Interop against tacquito
    runs-on: ubuntu-latest
    # The interop module (interop/go.mod) holds cross-implementation tests
    # against github.com/facebookincubator/tacquito. It is intentionally
    # decoupled from the main module so the main module does not need to
    # depend on tacquito. Run it on manual dispatch or when the interop
    # directory, the main module's public API, or this workflow changes.
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.run_interop == true
    defaults:
      run:
        working-directory: interop
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            go.sum
            interop/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run interop tests
        run: go test -race ./...
